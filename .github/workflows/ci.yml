name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    # Run on PRs targeting any branch
  workflow_dispatch:

env:
  MILL_VERSION: "1.1.5"
  # Opt into Node.js 24 now (forced default June 2026 anyway). Silences the
  # Node 20 deprecation warnings emitted by actions/checkout@v4, setup-java@v4,
  # setup-node@v4, cache@v4, codeql-action@v4 etc.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Scala: format, compile, test ─────────────────────────────────────────
  scala:
    name: Scala Build & Test
    runs-on: ubuntu-latest

    env:
      FAMILYDNS_JWT_SECRET: test-jwt-secret-for-ci-only

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Mill / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.mill
            ~/.cache/coursier
            out/
          key: mill-${{ env.MILL_VERSION }}-${{ hashFiles('build.mill') }}
          restore-keys: |
            mill-${{ env.MILL_VERSION }}-
            mill-

      - name: Install Mill (official launcher) and scalafmt
        run: |
          # Mill 1.x ships an official Bash launcher on Maven Central
          curl -fsSL "https://repo1.maven.org/maven2/com/lihaoyi/mill-dist/${MILL_VERSION}/mill-dist-${MILL_VERSION}-mill.sh" \
            -o /tmp/mill
          chmod +x /tmp/mill
          sudo mv /tmp/mill /usr/local/bin/mill
          mill --version
          # scalafmt via coursier (Coursier's app channel handles this fine)
          curl -fsSL https://github.com/coursier/coursier/releases/latest/download/cs-x86_64-pc-linux.gz \
            | gunzip > /tmp/cs
          chmod +x /tmp/cs
          /tmp/cs install --install-dir /usr/local/bin --quiet scalafmt

      - name: scalafmt --check
        run: scalafmt --check --non-interactive

      - name: Compile all modules
        run: mill __.compile

      - name: Run all tests (sequential to avoid embedded-pg lock contention)
        # api.test and dns.test both spin up EmbeddedPostgres, which uses a
        # JVM-wide file lock for binary unpacking. Running them in parallel
        # (the default for `mill __.test`) hits OverlappingFileLockException
        # in the second JVM. Run them in sequence — each is fast enough.
        run: |
          mill shared.test
          mill traffic.test
          mill api.test
          mill dns.test

  # ── Frontend: type-check, lint, build ────────────────────────────────────
  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

  # ── Security scan ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for github/codeql-action/upload-sarif to push results into
      # the Code Scanning tab. Without this the upload step 403s with
      # "Resource not accessible by integration".
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"
        if: always()
        continue-on-error: true
