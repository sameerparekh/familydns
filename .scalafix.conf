rules = [
  OrganizeImports,
  DisableSyntax,
  LeakingImplicitClassVal,
  NoValInForComprehension,
  ProcedureSyntax,
  RedundantSyntax,
]

OrganizeImports {
  groups = ["re:javax?\\.", "scala.", "*"]
  removeUnused = true
}

DisableSyntax {
  noVars = true
  noReturns = true
  noWhileLoops = true
  noAsInstanceOf = true
  noIsInstanceOf = true
  noXml = true
  noDefaultArgs = false
  noFinalVal = false
  noFinalize = true
  noValPatterns = false
  noUniversalEquality = false
}
