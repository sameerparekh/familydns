# Local + CI staging stack.
#
#   docker compose -f docker/docker-compose.yml up --build
#
# Then:
#   - browse to http://localhost:8080
#   - run e2e tests:  scripts/e2e-tests.sh
#
# Used identically in GitHub Actions (.github/workflows/e2e.yml).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: familydns
      POSTGRES_PASSWORD: familydns
      POSTGRES_DB: familydns
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familydns -d familydns"]
      interval: 2s
      timeout: 2s
      retries: 30
    ports:
      - "5433:5432"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FAMILYDNS_DB_HOST: postgres
      FAMILYDNS_DB_PORT: "5432"
      FAMILYDNS_DB_NAME: familydns
      FAMILYDNS_DB_USER: familydns
      FAMILYDNS_DB_PASSWORD: familydns
      FAMILYDNS_HTTP_PORT: "8080"
      FAMILYDNS_JWT_SECRET: "staging-jwt-secret-do-not-use-in-prod-32ch"
      FAMILYDNS_DNS_REFRESH: "5"
    ports:
      - "0.0.0.0:8080:8080"
    healthcheck:
      # Login endpoint with bad creds → 401, which proves the API + DB are alive.
      # `curl -f` would treat 401 as failure, so we check the body shape instead.
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' -X POST -H 'content-type: application/json' -d '{}' http://localhost:8080/api/auth/login | grep -qE '^(400|401)$'"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 20s

  dns:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # host networking so /proc/net/arp reflects the real LAN ARP table and
    # DNS is reachable from other machines without NAT obscuring the source IP.
    network_mode: host
    depends_on:
      api:
        condition: service_healthy
    environment:
      FAMILYDNS_MODE: dns
      # With host networking the docker service name "postgres" isn't resolvable;
      # reach it via the host-mapped port instead.
      FAMILYDNS_DB_HOST: 127.0.0.1
      FAMILYDNS_DB_PORT: "5433"
      FAMILYDNS_DB_NAME: familydns
      FAMILYDNS_DB_USER: familydns
      FAMILYDNS_DB_PASSWORD: familydns
      FAMILYDNS_JWT_SECRET: "staging-jwt-secret-do-not-use-in-prod-32ch"
      FAMILYDNS_DNS_REFRESH: "5"
      FAMILYDNS_DNS_PORT: "5354"
      FAMILYDNS_DNS_LOCATION: "staging"
    # No ports: mapping — host network mode binds directly to the host NIC.

  traffic:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      FAMILYDNS_MODE: traffic
      FAMILYDNS_DB_HOST: postgres
      FAMILYDNS_DB_PORT: "5432"
      FAMILYDNS_DB_NAME: familydns
      FAMILYDNS_DB_USER: familydns
      FAMILYDNS_DB_PASSWORD: familydns
      FAMILYDNS_JWT_SECRET: "staging-jwt-secret-do-not-use-in-prod-32ch"
      # eth0 inside the bridge — only sees this container's own packets, which
      # is enough to verify the service starts up. Real per-device capture
      # happens on the host via systemd (see deploy/familydns-traffic.service).
      FAMILYDNS_TRAFFIC_INTERFACE: "eth0"
      FAMILYDNS_TRAFFIC_FLUSH_INTERVAL: "5"
      FAMILYDNS_TRAFFIC_SESSION_TIMEOUT: "10"
      FAMILYDNS_TRAFFIC_LOCATION: "staging"
    cap_add:
      - NET_RAW
      - NET_ADMIN
